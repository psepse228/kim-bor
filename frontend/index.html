<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IG Check</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #161616; border: 1px solid #2a2a2a; border-radius: 16px; padding: 36px; width: 100%; max-width: 480px; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 8px; }
    p.sub { color: #888; font-size: 0.9rem; margin-bottom: 28px; }
    label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 6px; margin-top: 16px; text-transform: uppercase; letter-spacing: 0.05em; }
    input { width: 100%; background: #0a0a0a; border: 1px solid #333; border-radius: 8px; padding: 12px 14px; color: #e0e0e0; font-size: 1rem; }
    input:focus { outline: none; border-color: #555; }
    button { width: 100%; margin-top: 24px; padding: 13px; border-radius: 8px; border: none; background: #e0e0e0; color: #0a0a0a; font-size: 1rem; font-weight: 600; cursor: pointer; }
    button:hover { background: #fff; }
    .error { color: #ff6b6b; font-size: 0.85rem; margin-top: 12px; }
    .hidden { display: none !important; }
    #dashboard { max-width: 900px; padding: 24px 16px; width: 100%; }
    .stats-row { display: flex; gap: 16px; margin-bottom: 24px; }
    .stat-box { flex: 1; background: #161616; border: 1px solid #2a2a2a; border-radius: 12px; padding: 20px; text-align: center; }
    .stat-box .num { font-size: 2rem; font-weight: 700; }
    .stat-box .lbl { color: #888; font-size: 0.8rem; margin-top: 4px; }
    .sparkline { background: #161616; border: 1px solid #2a2a2a; border-radius: 12px; padding: 16px; margin-bottom: 24px; }
    .sparkline canvas { width: 100%; height: 60px; display: block; }
    .tables-row { display: flex; gap: 16px; margin-bottom: 24px; }
    .table-box { flex: 1; background: #161616; border: 1px solid #2a2a2a; border-radius: 12px; padding: 16px; }
    .table-box h3 { font-size: 0.85rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
    .table-box ul { list-style: none; }
    .table-box li { padding: 8px 0; border-bottom: 1px solid #222; font-size: 0.9rem; }
    .table-box li:last-child { border-bottom: none; }
    .empty { color: #555; font-size: 0.85rem; }
    .feed { background: #161616; border: 1px solid #2a2a2a; border-radius: 12px; padding: 16px; margin-bottom: 24px; }
    .feed h3 { font-size: 0.85rem; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
    .feed-item { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #222; font-size: 0.9rem; }
    .feed-item:last-child { border-bottom: none; }
    .feed-item .time { color: #555; font-size: 0.75rem; }
    .unfollow { color: #ff6b6b; }
    .follow { color: #69db7c; }
    .refresh-btn { background: #161616; border: 1px solid #333; color: #e0e0e0; border-radius: 8px; padding: 10px 20px; cursor: pointer; font-size: 0.85rem; }
    .refresh-btn:hover { border-color: #555; }
    footer { text-align: center; color: #444; font-size: 0.75rem; margin-top: 32px; padding-bottom: 24px; }
    footer a { color: #555; text-decoration: none; }
    footer a:hover { color: #888; }
    @media (max-width: 600px) { .tables-row { flex-direction: column; } .stats-row { flex-direction: column; } }
  </style>
</head>
<body>

<!-- View 1: Register -->
<div class="card" id="view-register">
  <h1>IG Check</h1>
  <p class="sub">Track your Instagram followers. Get notified instantly.</p>
  <label>Invite Password</label>
  <input type="password" id="reg-password" placeholder="Enter invite password" />
  <label>Instagram Username</label>
  <input type="text" id="reg-username" placeholder="@yourhandle" />
  <button id="reg-btn">Get Started</button>
  <p class="error hidden" id="reg-error"></p>
</div>

<!-- View 2: OTP Verify -->
<div class="card hidden" id="view-otp">
  <h1>Verify Telegram</h1>
  <p class="sub" id="otp-instruction">Message @BotName on Telegram — it will send you a 6-digit code.</p>
  <label>Verification Code</label>
  <input type="text" id="otp-input" placeholder="123456" maxlength="6" />
  <button id="otp-btn">Verify</button>
  <p class="error hidden" id="otp-error"></p>
</div>

<!-- View 3: Dashboard -->
<div id="dashboard" class="hidden">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;">
    <h1 style="font-size:1.3rem;">@<span id="dash-username"></span></h1>
    <button class="refresh-btn" id="refresh-btn">↻ Refresh Analysis</button>
  </div>

  <div class="stats-row">
    <div class="stat-box">
      <div class="num" id="stat-followers">—</div>
      <div class="lbl">Followers</div>
    </div>
    <div class="stat-box">
      <div class="num" id="stat-following">—</div>
      <div class="lbl">Following</div>
    </div>
    <div class="stat-box">
      <div class="num" id="stat-last-check">—</div>
      <div class="lbl">Last Check</div>
    </div>
  </div>

  <div class="sparkline">
    <canvas id="sparkline-canvas"></canvas>
  </div>

  <div class="tables-row">
    <div class="table-box">
      <h3>You follow · They don't</h3>
      <ul id="table-you-follow"></ul>
    </div>
    <div class="table-box">
      <h3>They follow · You don't</h3>
      <ul id="table-they-follow"></ul>
    </div>
  </div>

  <div class="feed">
    <h3>Recent Events</h3>
    <div id="event-feed"></div>
  </div>
</div>

<footer>Made by <a href="#">Solura</a></footer>

<script>
  const API_URL = 'https://your-railway-app.railway.app'; // ← CHANGE BEFORE DEPLOY

  let pendingUserId = null;

  function show(id) {
    ['view-register', 'view-otp', 'dashboard'].forEach((v) => {
      document.getElementById(v).classList.add('hidden');
    });
    document.getElementById(id).classList.remove('hidden');
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.classList.remove('hidden');
  }

  function hideError(id) {
    document.getElementById(id).classList.add('hidden');
  }

  document.getElementById('reg-btn').addEventListener('click', async () => {
    hideError('reg-error');
    const invitePassword = document.getElementById('reg-password').value.trim();
    const instagramUsername = document.getElementById('reg-username').value.trim();
    if (!invitePassword || !instagramUsername) return showError('reg-error', 'Fill in all fields.');

    const res = await fetch(`${API_URL}/register`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ invitePassword, instagramUsername }),
    });
    const data = await res.json();
    if (!res.ok) return showError('reg-error', data.error);

    pendingUserId = data.userId;
    document.getElementById('otp-instruction').textContent = data.message;
    show('view-otp');
  });

  document.getElementById('otp-btn').addEventListener('click', async () => {
    hideError('otp-error');
    const otp = document.getElementById('otp-input').value.trim();
    if (!otp) return showError('otp-error', 'Enter the code.');

    const res = await fetch(`${API_URL}/verify`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ userId: pendingUserId, otp }),
    });
    const data = await res.json();
    if (!res.ok) return showError('otp-error', data.error);

    localStorage.setItem('igcheck_userId', pendingUserId);
    await loadDashboard(pendingUserId);
    show('dashboard');
  });

  document.getElementById('refresh-btn').addEventListener('click', async () => {
    const userId = localStorage.getItem('igcheck_userId');
    if (!userId) return;
    document.getElementById('refresh-btn').textContent = '↻ Analyzing...';
    await fetch(`${API_URL}/analyze/${userId}`, { method: 'POST' });
    setTimeout(async () => {
      await loadDashboard(userId);
      document.getElementById('refresh-btn').textContent = '↻ Refresh Analysis';
    }, 30000);
  });

  function drawSparkline(dataPoints) {
    const canvas = document.getElementById('sparkline-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth;
    canvas.height = 60;
    if (!dataPoints.length) return;

    const counts = dataPoints.map((d) => d.follower_count);
    const min = Math.min(...counts);
    const max = Math.max(...counts);
    const range = max - min || 1;
    const w = canvas.width;
    const h = canvas.height;
    const step = w / (counts.length - 1 || 1);

    ctx.clearRect(0, 0, w, h);
    ctx.strokeStyle = '#69db7c';
    ctx.lineWidth = 2;
    ctx.beginPath();
    counts.forEach((c, i) => {
      const x = i * step;
      const y = h - ((c - min) / range) * (h - 10) - 5;
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.stroke();
  }

  function timeAgo(dateStr) {
    const diff = Date.now() - new Date(dateStr).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h ago`;
    return `${Math.floor(hrs / 24)}d ago`;
  }

  async function loadDashboard(userId) {
    const res = await fetch(`${API_URL}/dashboard/${userId}`);
    if (!res.ok) { localStorage.removeItem('igcheck_userId'); show('view-register'); return; }
    const data = await res.json();

    document.getElementById('dash-username').textContent = data.user.instagram_username;
    document.getElementById('stat-followers').textContent = data.latestSnapshot?.follower_count ?? '—';
    document.getElementById('stat-following').textContent = data.latestSnapshot?.following_count ?? '—';
    document.getElementById('stat-last-check').textContent = data.latestSnapshot ? timeAgo(data.latestSnapshot.taken_at) : '—';

    drawSparkline(data.sparkline || []);

    const youFollowEl = document.getElementById('table-you-follow');
    youFollowEl.innerHTML = data.youFollowNoReturn.length
      ? data.youFollowNoReturn.map((u) => `<li>@${u}</li>`).join('')
      : '<li class="empty">None — everyone follows back ✓</li>';

    const theyFollowEl = document.getElementById('table-they-follow');
    theyFollowEl.innerHTML = data.theyFollowNoReturn.length
      ? data.theyFollowNoReturn.map((u) => `<li>@${u}</li>`).join('')
      : '<li class="empty">None ✓</li>';

    const feedEl = document.getElementById('event-feed');
    if (!data.events.length) {
      feedEl.innerHTML = '<p class="empty">No events yet — first check still pending.</p>';
    } else {
      feedEl.innerHTML = data.events.map((e) => {
        const isUnfollow = e.type === 'unfollowed';
        return `<div class="feed-item">
          <span class="${isUnfollow ? 'unfollow' : 'follow'}">
            ${isUnfollow ? '❌' : '✅'} @${e.target_username} ${isUnfollow ? 'unfollowed you' : 'followed you'}
          </span>
          <span class="time">${timeAgo(e.detected_at)}</span>
        </div>`;
      }).join('');
    }
  }

  window.addEventListener('load', async () => {
    const userId = localStorage.getItem('igcheck_userId');
    if (userId) {
      await loadDashboard(userId);
      show('dashboard');
    }
  });
</script>
</body>
</html>
