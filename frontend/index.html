<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>kim bor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #06060e;
      --surface: #0b0b18;
      --surface2: #10101e;
      --surface3: #16162a;
      --border: rgba(255,255,255,0.055);
      --border2: rgba(255,255,255,0.1);
      --accent: #7c5cfc;
      --accent2: #a78bfa;
      --accent-glow: rgba(124,92,252,0.18);
      --accent-dim: rgba(124,92,252,0.08);
      --green: #10b981;
      --green-dim: rgba(16,185,129,0.08);
      --green-border: rgba(16,185,129,0.2);
      --red: #f43f5e;
      --red-dim: rgba(244,63,94,0.08);
      --red-border: rgba(244,63,94,0.2);
      --text: #f1f5f9;
      --text2: #cbd5e1;
      --muted: #7d8a9e;
      --dim: #3d4757;
      --r: 16px;
      --rs: 10px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      background-image:
        radial-gradient(ellipse 60% 40% at 50% -5%, rgba(124,92,252,0.07) 0%, transparent 70%);
    }

    /* ── Auth ── */
    .auth-wrap { width: 100%; max-width: 400px; }

    .logo { text-align: center; margin-bottom: 36px; }

    .logo-name {
      font-size: 2.2rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      background: linear-gradient(135deg, #fff 30%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .logo-sub {
      color: var(--muted);
      font-size: 0.82rem;
      margin-top: 8px;
      letter-spacing: 0.01em;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 28px;
    }

    .field { margin-top: 18px; }

    .field label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .field input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--rs);
      padding: 12px 14px;
      color: var(--text);
      font-size: 0.92rem;
      font-family: inherit;
      transition: border-color 0.15s, box-shadow 0.15s;
      outline: none;
    }

    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-dim);
    }

    .btn-primary {
      display: block;
      width: 100%;
      margin-top: 22px;
      padding: 13px;
      border-radius: var(--rs);
      border: none;
      background: var(--accent);
      color: #fff;
      font-size: 0.92rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      box-shadow: 0 4px 24px var(--accent-glow);
      letter-spacing: 0.01em;
    }

    .btn-primary:hover { opacity: 0.86; transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .error-msg {
      color: var(--red);
      font-size: 0.8rem;
      margin-top: 12px;
      padding: 10px 12px;
      background: var(--red-dim);
      border-radius: var(--rs);
      border: 1px solid var(--red-border);
    }

    /* ── Dashboard ── */
    #dashboard { width: 100%; max-width: 960px; }

    .dash-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 14px;
    }

    .dash-user { display: flex; align-items: center; gap: 13px; }

    .avatar {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--accent-dim);
      border: 1.5px solid rgba(124,92,252,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 700;
      font-size: 1rem;
      color: var(--accent2);
      flex-shrink: 0;
    }

    .dash-user-info h2 {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.01em;
    }

    .dash-status {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 2px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--green);
      flex-shrink: 0;
    }

    .btn-refresh {
      background: var(--surface2);
      border: 1px solid var(--border2);
      color: var(--text2);
      border-radius: var(--rs);
      padding: 9px 16px;
      font-size: 0.82rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .btn-refresh:hover {
      border-color: var(--accent);
      background: var(--accent-dim);
      color: var(--text);
    }

    .btn-refresh.loading { opacity: 0.5; pointer-events: none; }

    /* ── Stats ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 12px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 24px 20px 20px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s;
    }

    .stat-card:hover { border-color: var(--border2); }

    .stat-label {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 12px;
    }

    .stat-num {
      font-size: 2.4rem;
      font-weight: 800;
      letter-spacing: -0.04em;
      line-height: 1;
      color: var(--text);
    }

    .stat-sub {
      font-size: 0.72rem;
      color: var(--dim);
      margin-top: 8px;
    }

    /* ── Chart ── */
    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 20px 20px 16px;
      margin-bottom: 12px;
    }

    .section-label {
      font-size: 0.68rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: var(--muted);
      margin-bottom: 14px;
    }

    .chart-card canvas { width: 100%; height: 60px; display: block; }

    /* ── Two-col tables ── */
    .tables-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
      margin-bottom: 12px;
    }

    .table-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 20px;
    }

    .table-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 10px;
    }

    /* verified toggle switch */
    .verified-toggle-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }

    .verified-toggle-wrap .toggle-label {
      font-size: 0.72rem;
      font-weight: 500;
      color: var(--muted);
      transition: color 0.2s;
    }

    .verified-toggle-wrap.active .toggle-label { color: var(--accent2); }

    .toggle-track {
      width: 38px;
      height: 22px;
      border-radius: 11px;
      background: var(--surface3);
      border: 1px solid var(--border2);
      position: relative;
      transition: background 0.25s, border-color 0.25s;
      flex-shrink: 0;
    }

    .verified-toggle-wrap.active .toggle-track {
      background: var(--accent);
      border-color: var(--accent);
    }

    .toggle-thumb {
      position: absolute;
      top: 3px;
      left: 3px;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--muted);
      transition: transform 0.25s cubic-bezier(.4,0,.2,1), background 0.25s;
      box-shadow: 0 1px 4px rgba(0,0,0,0.4);
    }

    .verified-toggle-wrap.active .toggle-thumb {
      transform: translateX(16px);
      background: #fff;
    }

    /* username chips */
    .chip-list {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }

    .chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 5px 9px;
      font-size: 0.8rem;
      color: var(--text2);
      transition: border-color 0.15s, color 0.15s;
      text-decoration: none;
    }

    .chip:hover { border-color: var(--accent); color: var(--text); }

    .chip.verified {
      border-color: rgba(167,139,250,0.25);
      color: var(--accent2);
      background: var(--accent-dim);
    }

    .chip-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .chip-dot.red { background: var(--red); }
    .chip-dot.purple { background: var(--accent); }

    .verified-section {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .verified-label {
      font-size: 0.67rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent2);
      opacity: 0.7;
      margin-bottom: 8px;
    }

    .empty-state {
      font-size: 0.82rem;
      color: var(--dim);
      padding: 4px 0;
    }

    /* ── Event feed ── */
    .feed-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 20px;
      margin-bottom: 12px;
    }

    .event-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 14px;
      border-radius: var(--rs);
      margin-bottom: 5px;
      gap: 12px;
    }

    .event-item:last-child { margin-bottom: 0; }

    .event-item.unfollow {
      background: var(--red-dim);
      border: 1px solid var(--red-border);
    }

    .event-item.follow {
      background: var(--green-dim);
      border: 1px solid var(--green-border);
    }

    .event-left {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 0.85rem;
      min-width: 0;
    }

    .event-icon {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.9rem;
      flex-shrink: 0;
    }

    .event-item.unfollow .event-icon { background: var(--red-dim); color: var(--red); }
    .event-item.follow .event-icon { background: var(--green-dim); color: var(--green); }

    .event-text { min-width: 0; }
    .event-text strong { font-weight: 600; font-size: 0.85rem; }
    .event-text .ev-action { color: var(--muted); font-size: 0.82rem; }

    .event-time {
      font-size: 0.72rem;
      color: var(--dim);
      flex-shrink: 0;
      white-space: nowrap;
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      color: var(--dim);
      font-size: 0.72rem;
      padding: 24px 0 8px;
    }

    footer a { color: var(--muted); text-decoration: none; transition: color 0.15s; }
    footer a:hover { color: var(--accent2); }

    /* ── Utilities ── */
    .hidden { display: none !important; }

    @media (max-width: 640px) {
      .stats-grid { grid-template-columns: 1fr 1fr; }
      .stats-grid .stat-card:last-child { grid-column: span 2; }
      .tables-grid { grid-template-columns: 1fr; }
      .stat-num { font-size: 1.9rem; }
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .spin { display: inline-block; animation: spin 0.9s linear infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .pulsing { animation: pulse 1.5s ease infinite; }
  </style>
</head>
<body>

<!-- ── View 1: Register ── -->
<div class="auth-wrap hidden" id="view-register">
  <div class="logo">
    <div class="logo-name">kim bor</div>
    <div class="logo-sub">Instagram follower tracker</div>
  </div>
  <div class="card">
    <div class="field">
      <label>Invite Password</label>
      <input type="password" id="reg-password" placeholder="Enter invite code" />
    </div>
    <div class="field">
      <label>Instagram Username</label>
      <input type="text" id="reg-username" placeholder="@yourhandle" />
    </div>
    <button class="btn-primary" id="reg-btn">Get Started →</button>
    <p class="error-msg hidden" id="reg-error"></p>
  </div>
</div>

<!-- ── View 2: OTP ── -->
<div class="auth-wrap hidden" id="view-otp">
  <div class="logo">
    <div class="logo-name">kim bor</div>
  </div>
  <div class="card">
    <p style="color:var(--muted);font-size:0.88rem;line-height:1.6;" id="otp-instruction">Message the bot on Telegram to get your 6-digit code.</p>
    <div class="field">
      <label>Verification Code</label>
      <input type="text" id="otp-input" placeholder="123456" maxlength="6" inputmode="numeric" />
    </div>
    <button class="btn-primary" id="otp-btn">Verify →</button>
    <p class="error-msg hidden" id="otp-error"></p>
  </div>
</div>

<!-- ── View 3: Dashboard ── -->
<div id="dashboard" class="hidden">
  <div class="dash-header">
    <div class="dash-user">
      <div class="avatar" id="dash-avatar">?</div>
      <div class="dash-user-info">
        <h2>@<span id="dash-username"></span></h2>
        <div class="dash-status">
          <span class="status-dot"></span>
          <span id="dash-status">Loading...</span>
        </div>
      </div>
    </div>
    <button class="btn-refresh" id="refresh-btn">
      <span id="refresh-icon">↻</span> Refresh Analysis
    </button>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Followers</div>
      <div class="stat-num" id="stat-followers">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Following</div>
      <div class="stat-num" id="stat-following">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Last Check</div>
      <div class="stat-num" style="font-size:1.4rem;letter-spacing:-0.02em;" id="stat-last-check">—</div>
    </div>
  </div>

  <div class="chart-card">
    <div class="section-label">Follower Trend</div>
    <canvas id="sparkline-canvas"></canvas>
  </div>

  <div class="tables-grid">
    <div class="table-card">
      <div class="table-head">
        <div class="section-label" style="margin:0;">You follow · They don't</div>
        <div class="verified-toggle-wrap" id="verified-toggle">
          <span class="toggle-label">Verified</span>
          <div class="toggle-track"><div class="toggle-thumb"></div></div>
        </div>
      </div>
      <div class="chip-list" id="table-you-follow"></div>
      <div class="verified-section hidden" id="verified-section">
        <div class="verified-label">Verified accounts</div>
        <div class="chip-list" id="table-verified"></div>
      </div>
    </div>
    <div class="table-card">
      <div class="table-head">
        <div class="section-label" style="margin:0;">They follow · You don't</div>
      </div>
      <div class="chip-list" id="table-they-follow"></div>
    </div>
  </div>

  <div class="feed-card">
    <div class="section-label">Recent Events</div>
    <div id="event-feed"></div>
  </div>

  <footer>Made by <a href="#">Solura</a></footer>
</div>

<script>
  const API_URL = 'https://kim-bor-production.up.railway.app';
  const HEADERS = { 'Content-Type': 'application/json' };

  let pendingUserId = null;
  let verifiedLoaded = false;
  let verifiedActive = false;

  function show(id) {
    ['view-register', 'view-otp', 'dashboard'].forEach(v =>
      document.getElementById(v).classList.add('hidden')
    );
    document.getElementById(id).classList.remove('hidden');
  }

  function showError(id, msg) {
    const el = document.getElementById(id);
    el.textContent = msg;
    el.classList.remove('hidden');
  }

  function hideError(id) { document.getElementById(id).classList.add('hidden'); }

  function timeAgo(dateStr) {
    const diff = Date.now() - new Date(dateStr).getTime();
    const mins = Math.floor(diff / 60000);
    if (mins < 1) return 'just now';
    if (mins < 60) return `${mins}m ago`;
    const hrs = Math.floor(mins / 60);
    if (hrs < 24) return `${hrs}h ago`;
    return `${Math.floor(hrs / 24)}d ago`;
  }

  function chip(username, type) {
    const isVerified = type === 'verified';
    const dotClass = isVerified ? 'purple' : (type === 'red' ? 'red' : 'purple');
    return `<span class="chip ${isVerified ? 'verified' : ''}">
      <span class="chip-dot ${dotClass}"></span>@${username}
    </span>`;
  }

  // ── Register ──
  document.getElementById('reg-btn').addEventListener('click', async () => {
    hideError('reg-error');
    const invitePassword = document.getElementById('reg-password').value.trim();
    const instagramUsername = document.getElementById('reg-username').value.trim();
    if (!invitePassword || !instagramUsername) return showError('reg-error', 'Fill in all fields.');

    const btn = document.getElementById('reg-btn');
    btn.textContent = 'Loading...';
    btn.disabled = true;

    try {
      const res = await fetch(`${API_URL}/register`, {
        method: 'POST', headers: HEADERS,
        body: JSON.stringify({ invitePassword, instagramUsername }),
      });
      const data = await res.json();
      if (!res.ok) return showError('reg-error', data.error);

      if (data.alreadyVerified) {
        localStorage.setItem('igcheck_userId', data.userId);
        await loadDashboard(data.userId);
        show('dashboard');
        return;
      }

      pendingUserId = data.userId;
      document.getElementById('otp-instruction').textContent = data.message;
      show('view-otp');
    } finally {
      btn.textContent = 'Get Started →';
      btn.disabled = false;
    }
  });

  // ── OTP ──
  document.getElementById('otp-btn').addEventListener('click', async () => {
    hideError('otp-error');
    const otp = document.getElementById('otp-input').value.trim();
    if (!otp) return showError('otp-error', 'Enter the code.');

    const btn = document.getElementById('otp-btn');
    btn.textContent = 'Verifying...';
    btn.disabled = true;

    try {
      const res = await fetch(`${API_URL}/verify`, {
        method: 'POST', headers: HEADERS,
        body: JSON.stringify({ userId: pendingUserId, otp }),
      });
      const data = await res.json();
      if (!res.ok) return showError('otp-error', data.error);

      localStorage.setItem('igcheck_userId', pendingUserId);
      await loadDashboard(pendingUserId);
      show('dashboard');
    } finally {
      btn.textContent = 'Verify →';
      btn.disabled = false;
    }
  });

  // ── Refresh ──
  document.getElementById('refresh-btn').addEventListener('click', async () => {
    const userId = localStorage.getItem('igcheck_userId');
    if (!userId) return;

    const btn = document.getElementById('refresh-btn');
    const icon = document.getElementById('refresh-icon');
    btn.classList.add('loading');
    icon.classList.add('spin');
    verifiedLoaded = false;

    await fetch(`${API_URL}/analyze/${userId}`, { method: 'POST', headers: HEADERS });

    setTimeout(async () => {
      await loadDashboard(userId);
      btn.classList.remove('loading');
      icon.classList.remove('spin');
    }, 30000);
  });

  // ── Verified toggle ──
  document.getElementById('verified-toggle').addEventListener('click', async () => {
    const userId = localStorage.getItem('igcheck_userId');
    if (!userId) return;

    const toggleWrap = document.getElementById('verified-toggle');
    const section = document.getElementById('verified-section');
    const verifiedList = document.getElementById('table-verified');

    verifiedActive = !verifiedActive;
    toggleWrap.classList.toggle('active', verifiedActive);

    if (!verifiedActive) {
      section.classList.add('hidden');
      return;
    }

    if (!verifiedLoaded) {
      verifiedList.innerHTML = '<span class="empty-state pulsing">Loading...</span>';
      section.classList.remove('hidden');

      try {
        const res = await fetch(`${API_URL}/verified-noreturn/${userId}`, { headers: HEADERS });
        const data = await res.json();
        const list = data.youFollowNoReturnVerified || [];
        verifiedList.innerHTML = list.length
          ? list.map(u => chip(u, 'verified')).join('')
          : '<span class="empty-state">No verified accounts</span>';
        verifiedLoaded = true;
      } catch {
        verifiedList.innerHTML = '<span class="empty-state">Failed to load</span>';
      }
    } else {
      section.classList.remove('hidden');
    }
  });

  // ── Sparkline ──
  function drawSparkline(points) {
    const canvas = document.getElementById('sparkline-canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = canvas.offsetWidth * window.devicePixelRatio;
    canvas.height = 60 * window.devicePixelRatio;
    ctx.scale(window.devicePixelRatio, window.devicePixelRatio);

    const w = canvas.offsetWidth;
    const h = 60;

    if (!points.length || points.every(p => p.follower_count === 0)) {
      ctx.strokeStyle = 'rgba(124,92,252,0.15)';
      ctx.lineWidth = 1.5;
      ctx.setLineDash([5, 7]);
      ctx.beginPath();
      ctx.moveTo(0, h / 2);
      ctx.lineTo(w, h / 2);
      ctx.stroke();
      return;
    }

    const counts = points.map(p => p.follower_count);
    const min = Math.min(...counts);
    const max = Math.max(...counts);
    const range = max - min || 1;
    const step = w / Math.max(counts.length - 1, 1);
    const pad = 6;

    const getY = c => h - pad - ((c - min) / range) * (h - pad * 2);

    const grad = ctx.createLinearGradient(0, 0, 0, h);
    grad.addColorStop(0, 'rgba(124,92,252,0.25)');
    grad.addColorStop(1, 'rgba(124,92,252,0)');

    ctx.beginPath();
    counts.forEach((c, i) => {
      const x = i * step;
      const y = getY(c);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.lineTo((counts.length - 1) * step, h);
    ctx.lineTo(0, h);
    ctx.closePath();
    ctx.fillStyle = grad;
    ctx.fill();

    ctx.beginPath();
    counts.forEach((c, i) => {
      const x = i * step;
      const y = getY(c);
      i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
    });
    ctx.strokeStyle = '#7c5cfc';
    ctx.lineWidth = 2;
    ctx.lineJoin = 'round';
    ctx.stroke();
  }

  // ── Dashboard ──
  async function loadDashboard(userId) {
    const res = await fetch(`${API_URL}/dashboard/${userId}`, { headers: HEADERS });
    if (!res.ok) { localStorage.removeItem('igcheck_userId'); show('view-register'); return; }
    const data = await res.json();

    const username = data.user.instagram_username;
    document.getElementById('dash-username').textContent = username;
    document.getElementById('dash-avatar').textContent = username[0].toUpperCase();

    const snap = data.latestSnapshot;
    if (snap) {
      document.getElementById('stat-followers').textContent = snap.follower_count.toLocaleString();
      document.getElementById('stat-following').textContent = snap.following_count.toLocaleString();
      document.getElementById('stat-last-check').textContent = timeAgo(snap.taken_at);
      document.getElementById('dash-status').textContent = `Updated ${timeAgo(snap.taken_at)}`;
    } else {
      document.getElementById('dash-status').textContent = 'First check pending...';
    }

    drawSparkline(data.sparkline || []);

    const youFollowEl = document.getElementById('table-you-follow');
    youFollowEl.innerHTML = data.youFollowNoReturn.length
      ? data.youFollowNoReturn.map(u => chip(u, 'red')).join('')
      : '<span class="empty-state">Everyone follows back ✓</span>';

    const theyFollowEl = document.getElementById('table-they-follow');
    theyFollowEl.innerHTML = data.theyFollowNoReturn.length
      ? data.theyFollowNoReturn.map(u => chip(u, 'purple')).join('')
      : '<span class="empty-state">None ✓</span>';

    const feedEl = document.getElementById('event-feed');
    if (!data.events.length) {
      feedEl.innerHTML = '<p class="empty-state">No events recorded yet.</p>';
    } else {
      feedEl.innerHTML = data.events.map(e => {
        const isUnfollow = e.type === 'unfollowed';
        return `<div class="event-item ${isUnfollow ? 'unfollow' : 'follow'}">
          <div class="event-left">
            <div class="event-icon">${isUnfollow ? '↓' : '↑'}</div>
            <div class="event-text">
              <strong>@${e.target_username}</strong>
              <span class="ev-action"> ${isUnfollow ? 'unfollowed you' : 'followed you'}</span>
            </div>
          </div>
          <span class="event-time">${timeAgo(e.detected_at)}</span>
        </div>`;
      }).join('');
    }
  }

  window.addEventListener('load', async () => {
    const userId = localStorage.getItem('igcheck_userId');
    if (userId) {
      await loadDashboard(userId);
      show('dashboard');
    } else {
      show('view-register');
    }
  });
</script>
